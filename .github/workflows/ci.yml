name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang llvm lld qemu-system-riscv32 curl

      - name: Cache opensbi firmware
        id: cache-opensbi
        uses: actions/cache@v6
        with:
          path: opensbi-riscv32-generic-fw_dynamic.bin
          key: opensbi-riscv32-generic-fw_dynamic-v8.0.4

      - name: Download opensbi firmware
        if: steps.cache-opensbi.outputs.cache-hit != 'true'
        run: curl -LO https://github.com/qemu/qemu/raw/v8.0.4/pc-bios/opensbi-riscv32-generic-fw_dynamic.bin

      - name: Build and run
        run: ./run.sh
